<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6f4e37" />
  <title>每日基督教靈修</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{--bg:#fffaf3;--card:#ffffff;--ink:#2b2118;--muted:#76685c;--brand:#6f4e37;--brand2:#8b6b4d;--line:#eadfce;--fs:18px}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#fffaf3,#f7efe3);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;font-size:var(--fs);line-height:1.75}
    .wrap{max-width:920px;margin:0 auto;padding:18px 14px 90px}.hero{padding:22px 18px;border-radius:24px;background:linear-gradient(135deg,#6f4e37,#a07855);color:#fff;box-shadow:0 14px 35px rgba(72,45,22,.2)}
    h1{font-size:1.55rem;margin:.1rem 0 .2rem}.sub{opacity:.9;font-size:.95rem}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:10px 12px;border-radius:14px;font-weight:650;cursor:pointer}.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
    .tabs{position:sticky;top:0;z-index:2;background:rgba(255,250,243,.94);backdrop-filter:blur(10px);display:flex;gap:8px;overflow-x:auto;padding:10px 0}.tab{white-space:nowrap;border:1px solid var(--line);background:#fff;padding:9px 12px;border-radius:999px;color:var(--muted);font-weight:700}.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;margin:12px 0;box-shadow:0 8px 26px rgba(85,60,32,.08)} h2{font-size:1.28rem;margin:.1rem 0 .8rem;color:var(--brand)} h3{font-size:1.05rem;color:var(--brand2)} blockquote{border-left:5px solid var(--brand2);margin:12px 0;padding:10px 14px;background:#fbf5ec;border-radius:12px} .en{color:#493d32}.muted{color:var(--muted);font-size:.92rem}.section{display:none}.section.active{display:block}.editor{display:none}.editor.active{display:block}.editor textarea{width:100%;min-height:330px;border:1px solid var(--line);border-radius:18px;padding:14px;font:inherit;line-height:1.55;background:#fff}.grid{display:grid;gap:12px}.notice{font-size:.92rem;color:var(--muted);background:#fff7e8;border:1px solid var(--line);padding:12px;border-radius:16px} footer{color:var(--muted);font-size:.86rem;text-align:center;margin-top:24px}
    @media(min-width:720px){.grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <header class="hero"><h1>每日基督教靈修</h1><div class="sub">繁體中文・RCUV / ESV 節選・中英對照・可分頁閱讀</div></header>
  <div class="toolbar"><button class="btn" id="smaller">A−</button><button class="btn" id="larger">A＋</button><button class="btn primary" id="editBtn">貼上／更新今日靈修</button><button class="btn" id="exportBtn">匯出備份</button></div>
  <div class="notice">此版本不需要 OpenAI API Key。建議每天早上收到 ChatGPT 排程靈修後，複製貼到本 App；App 會保存在手機瀏覽器本機，內容就能與 ChatGPT 生成文一致。</div>
  <div class="editor" id="editor"><div class="card"><h2>貼上今日靈修</h2><p class="muted">可直接貼上 ChatGPT 每日靈修全文。若內容使用標題如「今日經文、今日默想、今日禱告、今日詩歌、今日一句話」，App 會自動分頁。</p><textarea id="input" placeholder="把 ChatGPT 生成的今日基督教靈修貼在這裡..."></textarea><div class="toolbar"><button class="btn primary" id="saveBtn">儲存並分頁</button><button class="btn" id="cancelBtn">取消</button></div></div></div>
  <nav class="tabs" id="tabs"></nav>
  <main id="content"></main>
  <footer>加入 iPhone 主畫面後即可像 App 使用。資料保存在本機瀏覽器。</footer>
</div>
<script>
const defaultText = `# 今日基督教靈修｜示範內容\n\n## 今日經文｜Today’s Scripture\n中文｜和合本修訂版（RCUV）\n「我的肉體和我的心腸衰殘；但神是我心裏的力量，又是我的福分，直到永遠。」\n\nEnglish｜ESV\n“My flesh and my heart may fail, but God is the strength of my heart and my portion forever.”\n\n## 今日默想｜Today’s Meditation\n中文：詩篇七十三篇不是膚淺的安慰，而是信心在困惑中被神重新校正。亞薩看見惡人興盛、義人受苦，幾乎失腳；但當他進入神的聖所，他看見真正的福分不是環境順利，而是神自己。\n\nEnglish: Psalm 73 is not shallow comfort. It shows faith being corrected before God. Asaph learns that the ultimate blessing is not merely favorable circumstances, but God Himself as his portion.\n\n## 今日操練｜Today’s Practice\n今天安靜五分鐘，慢讀詩篇73:26三次，然後對主說：主，即使我的力量有限，求你使我以你自己為我的福分。\n\n## 今日禱告｜Today’s Prayer\n中文：主耶穌，求你救我脫離對自己力量的倚靠，使我在順境與逆境中，都以你自己為我心裏的力量和永遠的福分。阿們。\n\nEnglish: Lord Jesus, deliver me from trusting in my own strength. Teach me, in prosperity and adversity, to receive You as the strength of my heart and my everlasting portion. Amen.\n\n## 今日詩歌｜Today’s Hymn\n《除你以外》／“Whom Have I in Heaven but You?”：這首詩歌呼應詩篇73:25–26，幫助我們把心從神的恩賜轉向賜恩典的神自己。\n\n## 今日一句話｜Today’s One Sentence\n中文：信心不是相信自己永不衰殘，而是在衰殘之中仍以神自己為永遠的福分。\n\nEnglish: Faith is not believing that we will never fail, but receiving God Himself as our everlasting portion even when our strength fails.`;
const keys={text:'devotionTextV2',fs:'devotionFontSize'};let text=localStorage.getItem(keys.text)||defaultText;let fs=Number(localStorage.getItem(keys.fs)||18);document.documentElement.style.setProperty('--fs',fs+'px');
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function md(s){return esc(s).replace(/^# (.*)$/gm,'<h2>$1</h2>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^「(.*)」$/gm,'<blockquote>「$1」</blockquote>').replace(/^“(.*)”$/gm,'<blockquote class="en">“$1”</blockquote>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/^/,'<p>').replace(/$/,'</p>')}
function splitSections(t){const names=['今日經文','今日默想','今日操練','今日可實行的操練','今日禱告','今日詩歌','今日一句話'];let parts=[];let re=new RegExp('(^##?\\s*)?(' + names.join('|') + ')[^\\n]*','gm');let matches=[...t.matchAll(re)];if(!matches.length)return [{title:'全文',body:t}];for(let i=0;i<matches.length;i++){let start=matches[i].index;let end=i+1<matches.length?matches[i+1].index:t.length;let title=matches[i][0].replace(/^#+\s*/,'').trim().split('｜')[0];parts.push({title,body:t.slice(start,end).trim()});}let before=t.slice(0,matches[0].index).trim(); if(before) parts.unshift({title:'主題',body:before}); return parts;}
function render(){const sections=splitSections(text);tabs.innerHTML='';content.innerHTML='';sections.forEach((p,i)=>{let b=document.createElement('button');b.className='tab'+(i===0?' active':'');b.textContent=p.title;b.onclick=()=>activate(i);tabs.appendChild(b);let div=document.createElement('section');div.className='section'+(i===0?' active':'');div.innerHTML='<div class="card">'+md(p.body)+'</div>';content.appendChild(div);});}
function activate(i){document.querySelectorAll('.tab').forEach((e,n)=>e.classList.toggle('active',n===i));document.querySelectorAll('.section').forEach((e,n)=>e.classList.toggle('active',n===i));window.scrollTo({top:0,behavior:'smooth'});}
editBtn.onclick=()=>{editor.classList.add('active');input.value=text;input.focus()};cancelBtn.onclick=()=>editor.classList.remove('active');saveBtn.onclick=()=>{text=input.value.trim()||defaultText;localStorage.setItem(keys.text,text);editor.classList.remove('active');render()};smaller.onclick=()=>{fs=Math.max(15,fs-1);localStorage.setItem(keys.fs,fs);document.documentElement.style.setProperty('--fs',fs+'px')};larger.onclick=()=>{fs=Math.min(28,fs+1);localStorage.setItem(keys.fs,fs);document.documentElement.style.setProperty('--fs',fs+'px')};exportBtn.onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download='daily-devotion.txt';a.click()};
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});render();
</script>
</body></html>
