<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#6b4f3f"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="每日靈修"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icons/icon-192.png"><title>每日基督教靈修</title><style>
:root{--bg:#fbf7ef;--card:#fffaf2;--ink:#2d2118;--muted:#75665a;--accent:#7b5b43;--line:#eadfce}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:linear-gradient(#fff7ea,#f8efe0);color:var(--ink);line-height:1.75}.wrap{max-width:920px;margin:0 auto;padding:22px 16px 80px}.hero{padding:28px 20px;border:1px solid var(--line);border-radius:28px;background:rgba(255,250,242,.86);box-shadow:0 10px 35px #8a6a4a22}.kicker{color:var(--accent);font-weight:700}.title{font-size:clamp(28px,6vw,48px);line-height:1.15;margin:8px 0}.sub{color:var(--muted)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}button{border:0;border-radius:999px;padding:10px 16px;background:var(--accent);color:white;font-weight:700}button.secondary{background:#efe3d1;color:var(--ink)}.card{margin-top:16px;padding:20px;border:1px solid var(--line);border-radius:22px;background:var(--card);box-shadow:0 4px 18px #6b4f3f12}h2{font-size:22px;margin:0 0 10px;color:#5d402e}.ref{font-weight:700;color:var(--accent)}blockquote{margin:10px 0;padding:12px 16px;border-left:5px solid var(--accent);background:#fff;border-radius:12px}.en{color:#4e4036}.label{display:inline-block;font-size:13px;font-weight:800;color:var(--accent);background:#efe3d1;border-radius:999px;padding:2px 9px;margin-right:6px}.one{font-size:22px;font-weight:800}.foot{font-size:13px;color:var(--muted);margin-top:16px}.hidden{display:none}@media(min-width:760px){.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{margin-top:0}.span{grid-column:1/-1}}
</style></head><body><main class="wrap"><section class="hero"><div class="kicker">每日基督教靈修 Daily Christian Devotion</div><h1 class="title" id="theme">載入中...</h1><div class="sub" id="date"></div><div class="toolbar"><button id="prev">前一篇</button><button id="today" class="secondary">回到今日</button><button id="next">下一篇</button></div><div class="foot">內容含中英經文、今日默想、操練、中英禱告、詩歌與今日一句話。可用 Safari「加入主畫面」安裝成 iPhone PWA。</div></section><div class="grid" style="margin-top:16px"><section class="card span"><h2>今日經文 Scripture</h2><div class="ref" id="reference"></div><blockquote><span class="label">和合本修訂版</span><span id="scriptureZh"></span></blockquote><blockquote class="en"><span class="label">ESV</span><span id="scriptureEn"></span></blockquote></section><section class="card"><h2>今日默想 Meditation</h2><p id="meditationZh"></p><p class="en" id="meditationEn"></p></section><section class="card"><h2>今日可實行的操練 Practice</h2><p id="practiceZh"></p><p class="en" id="practiceEn"></p></section><section class="card"><h2>今日禱告 Prayer</h2><p id="prayerZh"></p><p class="en" id="prayerEn"></p></section><section class="card"><h2>今日詩歌 Hymn</h2><p><b id="hymnZh"></b><br><span class="en" id="hymnEn"></span></p><p id="hymnNoteZh"></p><p class="en" id="hymnNoteEn"></p></section><section class="card span"><h2>今日一句話 One Sentence</h2><p class="one" id="oneLineZh"></p><p class="one en" id="oneLineEn"></p></section></div></main><script>
const devotions=[{theme:'住在基督裡，讓生命結果子',reference:'約翰福音 John 15:4–5',scriptureZh:'你們要常在我裏面，我也常在你們裏面。枝子若不常在葡萄樹上，自己就不能結果子；你們若不常在我裏面，也是這樣。我是葡萄樹，你們是枝子；常在我裏面的，我也常在他裏面，這人就多結果子；因為離了我，你們就不能做甚麼。',scriptureEn:'Abide in me, and I in you. As the branch cannot bear fruit by itself, unless it abides in the vine… for apart from me you can do nothing.',meditationZh:'主耶穌不是先吩咐枝子製造果子，而是呼召枝子住在葡萄樹上。基督徒的生命不是離開基督之後靠意志修補自己，而是在與基督聯合中領受祂的生命供應。',meditationEn:'Jesus does not first command the branch to manufacture fruit; he calls it to abide in the vine. Christian life is not self-repair apart from Christ but receiving his life through union with him.',practiceZh:'今天找五分鐘安靜讀三次：「我是葡萄樹，你們是枝子。」在一件容易焦慮的事上，先停三十秒轉向主，再開始處理。',practiceEn:'Take five quiet minutes and read three times: “I am the vine; you are the branches.” Before one anxiety-producing task, pause for thirty seconds, turn to the Lord, and then act.',prayerZh:'主耶穌，使我今天不憑自己掙扎，乃住在你裡面，從你領受生命、力量與恩典。阿們。',prayerEn:'Lord Jesus, keep me from striving in myself today. Teach me to abide in You and receive life, strength, and grace from You. Amen.',hymnZh:'《與我同住》',hymnEn:'Abide with Me',hymnNoteZh:'這首詩歌把信徒最深的需要化成禱告：不是只有事情順利，而是主與我同住、我也住在祂裡面。',hymnNoteEn:'This hymn turns the believer’s deepest need into prayer: not merely better circumstances, but Christ abiding with us and we in him.',oneLineZh:'結果子不是焦慮地用力，而是持續地住在基督裡。',oneLineEn:'Fruitfulness is not anxious striving but sustained abiding in Christ.'},{theme:'恩典夠用',reference:'哥林多後書 2 Corinthians 12:9',scriptureZh:'他對我說：「我的恩典是夠你用的，因為我的能力是在人的軟弱上顯得完全。」',scriptureEn:'My grace is sufficient for you, for my power is made perfect in weakness.',meditationZh:'神有時不先除去限制，而是在限制中把基督更深給我們。恩典不是叫人硬撐的口號，而是復活的基督在軟弱中托住我們。',meditationEn:'God may not first remove the limitation; he may give Christ more deeply within it. Grace is not a slogan for pushing harder; it is the risen Christ sustaining us in weakness.',practiceZh:'當你今天感到能力不足時，停六十秒：承認有限、相信恩典、交託下一步。只忠心完成眼前一件該做的事。',practiceEn:'When you feel inadequate today, pause for sixty seconds: admit your limitation, trust his grace, and entrust the next step to him.',prayerZh:'主耶穌，赦免我害怕軟弱，也赦免我常靠自己證明自己。求你使我認識你的恩典今日仍然夠用。阿們。',prayerEn:'Lord Jesus, forgive my fear of weakness and my desire to prove myself by my own strength. Teach me that Your grace is sufficient today. Amen.',hymnZh:'《奇異恩典》',hymnEn:'Amazing Grace',hymnNoteZh:'這首詩歌提醒我們，信徒從開始到末了都靠恩典，不是靠自己從不軟弱。',hymnNoteEn:'This hymn reminds us that believers are carried by grace from beginning to end, not by never being weak.',oneLineZh:'你的軟弱不是基督能力的終點，而可能是你重新倚靠祂的入口。',oneLineEn:'Your weakness is not the end of Christ’s power; it may be the doorway to deeper dependence.'},{theme:'安息在基督裡',reference:'馬太福音 Matthew 11:28',scriptureZh:'凡勞苦擔重擔的人都到我這裏來，我要使你們得安息。',scriptureEn:'Come to me, all who labor and are heavy laden, and I will give you rest.',meditationZh:'主給勞苦者的第一句話不是「做得更好」，而是「到我這裡來」。安息不是逃離責任，而是不再獨自背負人生。',meditationEn:'The Lord’s first word to the weary is not “perform better” but “come to me.” Rest is not escape from responsibility; it is no longer carrying life alone.',practiceZh:'寫下今天最重的擔子，禱告：「主，這件事我要在你的主權下處理。」然後用平安的心做下一步。',practiceEn:'Write down your heaviest burden today and pray, “Lord, I will handle this under Your lordship.” Then take the next step with peace.',prayerZh:'主耶穌，我把重擔帶到你面前。求你使我在恩典中得安息，不逃避責任，也不憑自己掙扎。阿們。',prayerEn:'Lord Jesus, I bring my burdens to You. Give me rest in Your grace. Keep me from avoiding responsibility and from striving in self-reliance. Amen.',hymnZh:'《我心靈得安寧》',hymnEn:'It Is Well with My Soul',hymnNoteZh:'這首詩歌見證真正平安不是環境無風浪，而是靈魂因基督而安穩。',hymnNoteEn:'This hymn witnesses that true peace is not the absence of storms but the soul’s security in Christ.',oneLineZh:'安息不是沒有重擔，而是不再離開基督獨自背負。',oneLineEn:'Rest is not the absence of burdens, but no longer bearing them apart from Christ.'}];
let offset=0;function pick(){const start=new Date('2026-07-06T00:00:00+08:00');const now=new Date();const days=Math.floor((now-start)/86400000);return ((days+offset)%devotions.length+devotions.length)%devotions.length}function render(){const d=devotions[pick()];document.title=d.theme+'｜每日靈修';for(const k in d){const el=document.getElementById(k);if(el)el.textContent=d[k]}document.getElementById('date').textContent=new Intl.DateTimeFormat('zh-TW',{dateStyle:'full'}).format(new Date())}prev.onclick=()=>{offset--;render()};next.onclick=()=>{offset++;render()};today.onclick=()=>{offset=0;render()};render();if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script></body></html>
