<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f5d50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="每日靈修" />
  <title>每日基督教靈修</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/icon-192.png" />
  <link rel="icon" href="./assets/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Daily Christian Devotion</p>
        <h1>每日基督教靈修</h1>
        <p class="subtitle">依日期讀取 Google Drive「每日靈修」資料夾中的原生 Google Docs。</p>
      </div>
      <button id="settingsToggle" class="ghost-btn" type="button" aria-expanded="false">設定</button>
    </header>

    <section id="settingsPanel" class="panel settings hidden" aria-label="連線設定">
      <h2>連線設定</h2>
      <p class="hint">
        第一次使用請貼上 Google Apps Script Web App URL 與讀取 token。這些資料只存在這台手機/瀏覽器的 localStorage，不會寫進 GitHub。
      </p>
      <label>
        Google Apps Script Web App URL
        <input id="endpointInput" type="url" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off" />
      </label>
      <label>
        讀取 Token
        <input id="tokenInput" type="password" placeholder="你在 Apps Script 設定的 APP_TOKEN" autocomplete="off" />
      </label>
      <div class="row">
        <button id="saveSettingsBtn" class="primary-btn" type="button">儲存設定</button>
        <button id="clearSettingsBtn" class="ghost-btn" type="button">清除</button>
      </div>
      <p id="settingsStatus" class="status" role="status"></p>
    </section>

    <main>
      <section class="panel controls" aria-label="讀取控制">
        <div class="date-control">
          <label for="dateInput">靈修日期</label>
          <input id="dateInput" type="date" />
        </div>

        <div class="row wrap">
          <button id="loadBtn" class="primary-btn" type="button">讀取</button>
          <button id="todayBtn" class="secondary-btn" type="button">今天</button>
          <button id="openDocBtn" class="ghost-btn" type="button" disabled>開啟 Google Docs</button>
        </div>

        <div class="font-tools" aria-label="字型大小">
          <span>字型</span>
          <button id="fontDownBtn" type="button" aria-label="縮小字型">A−</button>
          <button id="fontUpBtn" type="button" aria-label="放大字型">A＋</button>
          <button id="fontResetBtn" type="button">重設</button>
        </div>

        <p id="appStatus" class="status" role="status">請先完成設定，然後按「讀取」。</p>
      </section>

      <section id="metaPanel" class="panel meta hidden" aria-label="靈修資訊">
        <p id="devotionDate"></p>
        <h2 id="devotionTitle"></h2>
        <p id="devotionUpdated"></p>
      </section>

      <nav id="sectionNav" class="section-nav hidden" aria-label="靈修單元"></nav>

      <article id="reader" class="reader panel" aria-live="polite">
        <div class="empty-state">
          <div class="cross">✦</div>
          <h2>尚未讀取今日靈修</h2>
          <p>按下「讀取」後，App 會依日期到 Google Drive 尋找標題格式為「每日靈修 YYYY-MM-DD｜主題」的 Google Docs。</p>
        </div>
      </article>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
